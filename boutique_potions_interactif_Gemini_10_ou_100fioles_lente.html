<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potions Mystères - ÉLÉA</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --primary: #6d28d9;
            --accent: #f59e0b;
            --bg: #1e1b4b;
            --text: #f8fafc;
            --card: #2e1065;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Empêche le défilement global */
        }
        .app-container {
            width: 95vw;
            height: 90vh;
            max-width: 1000px;
            background: var(--card);
            border-radius: 15px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 15px;
            padding: 15px;
            border: 1px solid var(--primary);
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 15px;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        h2 { color: var(--accent); font-size: 1.2rem; margin: 0; text-align: center; }
        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-plus { background: var(--primary); color: white; }
        .btn-plus:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-check { background: var(--accent); color: #451a03; }
        #chart { flex-grow: 1; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .quiz-zone {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid var(--primary);
            background: #1e1b4b;
            color: white;
            text-align: center;
        }
        .feedback { font-size: 0.85rem; height: 35px; margin-top: 5px; }
        .footer-text { font-size: 0.75rem; opacity: 0.7; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>🧪 Labo de Potions</h2>
        <div class="stat-box">
            <div>Fioles ouvertes</div>
            <div id="total-count" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div>Potions de Cristal</div>
            <div id="success-count" class="stat-value">0</div>
        </div>
        
        <button id="btn-1" class="btn-plus" onclick="play(10)">Ouvrir 10 fioles </button>
        <button id="btn-5" class="btn-plus" onclick="playAnimated(100)"> Ouvrir 100 fioles </button>
        
        <div class="quiz-zone">
            <div style="font-size: 0.9rem;">Quelle est la probabilité ?</div>
            <input type="text" id="user-guess" placeholder="Ex: 20% ou 0,2 ou 1/5">
            <button class="btn-check" onclick="checkAnswer()">Valider l'enquête</button>
            <div id="feedback" class="feedback"></div>
        </div>
        
        <button style="background: #ef4444; color: white; font-size: 0.8rem;" onclick="resetGame()">Nouveau Mystère</button>
        <div class="footer-text">Loi des Grands Nombres</div>
    </div>

    <div class="main-content">
        <div id="chart"></div>
    </div>
</div>

<script>
    let probs = [0.05, 0.1, 0.125, 0.2, 0.25, 0.5];
    let secretProb, total, successes, history, isAnimating = false;

    function init() {
        secretProb = probs[Math.floor(Math.random() * probs.length)];
        total = 0; successes = 0; history = [];
        updateUI();
    }

    async function playAnimated(count) {
        if (isAnimating) return;
        isAnimating = true;
        document.getElementById('btn-5').disabled = true;
        
        for (let i = 0; i < count; i++) {
            play(1);
            await new Promise(r => setTimeout(r, 100)); // Délai de 0.1s entre chaque fiole
        }
        
        isAnimating = false;
        document.getElementById('btn-5').disabled = false;
    }

    function play(count) {
        for (let i = 0; i < count; i++) {
            total++;
            if (Math.random() < secretProb) successes++;
            history.push({x: total, y: (successes / total) * 100});
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('total-count').innerText = total;
        document.getElementById('success-count').innerText = successes;
        
        const trace = {
            x: history.map(d => d.x),
            y: history.map(d => d.y),
            type: 'scatter', mode: 'lines',
            line: {color: '#f59e0b', width: 3}
        };

        const layout = {
            paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            font: {color: '#f8fafc', size: 10},
            margin: {t: 20, r: 20, b: 40, l: 40},
            xaxis: {title: 'Fioles', gridcolor: '#444'},
            yaxis: {title: 'Fréquence (%)', gridcolor: '#444', range: [0, 100]}
        };

        Plotly.newPlot('chart', [trace], layout, {responsive: true, displayModeBar: false});
    }

    function checkAnswer() {
        const input = document.getElementById('user-guess').value.replace(',', '.').trim();
        const f = document.getElementById('feedback');
        let val;
        
        if (input.includes('/')) {
            const p = input.split('/');
            val = parseFloat(p[0]) / parseFloat(p[1]);
        } else if (input.includes('%')) {
            val = parseFloat(input.replace('%', '')) / 100;
        } else { val = parseFloat(input); }

        if (Math.abs(val - secretProb) < 0.01) {
            f.innerHTML = `<span style="color:#4ade80">Bravo ! C'est bien ${(secretProb*100).toString().replace('.',',')}%</span>`;
        } else {
            f.innerHTML = `<span style="color:#f87171">Pas encore... Observe bien la courbe !</span>`;
        }
    }

    function resetGame() {
        document.getElementById('user-guess').value = "";
        document.getElementById('feedback').innerText = "";
        init();
    }

    init();
</script>
</body>
</html>
